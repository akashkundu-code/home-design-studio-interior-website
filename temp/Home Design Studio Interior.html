<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home Design Studio Interior — Estimation to Execution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="pages-home.jsx"></script>
<script type="text/babel" src="pages-services.jsx"></script>
<script type="text/babel" src="pages-portfolio.jsx"></script>
<script type="text/babel" src="pages-book.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "warm",
  "heroVariant": "fullbleed",
  "density": "regular"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('home');

  useEffect(() => {
    const html = document.documentElement;
    html.setAttribute('data-theme', t.theme);
    html.setAttribute('data-density', t.density);
  }, [t.theme, t.density]);

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [page]);

  return (
    <>
      <TopNav page={page} setPage={setPage} />

      {page === 'home' && <HomePage setPage={setPage} heroVariant={t.heroVariant} />}
      {page === 'services' && <ServicesPage setPage={setPage} />}
      {page === 'process' && <ProcessPage setPage={setPage} />}
      {page === 'portfolio' && <PortfolioPage setPage={setPage} />}
      {page === 'about' && <AboutPage setPage={setPage} />}
      {page === 'book' && <BookingPage setPage={setPage} />}

      <Footer setPage={setPage} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Palette" value={t.theme}
          options={[{ value: 'warm', label: 'Warm' }, { value: 'earthy', label: 'Earthy' }, { value: 'moody', label: 'Moody' }]}
          onChange={(v) => setTweak('theme', v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Hero" value={t.heroVariant}
          options={[{ value: 'fullbleed', label: 'Full-bleed' }, { value: 'split', label: 'Split' }]}
          onChange={(v) => setTweak('heroVariant', v)} />
        <TweakRadio label="Density" value={t.density}
          options={[{ value: 'compact', label: 'Compact' }, { value: 'regular', label: 'Regular' }, { value: 'airy', label: 'Airy' }]}
          onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Quick links" />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
          <TweakButton label="Home" secondary onClick={() => setPage('home')} />
          <TweakButton label="Services" secondary onClick={() => setPage('services')} />
          <TweakButton label="Process" secondary onClick={() => setPage('process')} />
          <TweakButton label="Portfolio" secondary onClick={() => setPage('portfolio')} />
          <TweakButton label="Studio" secondary onClick={() => setPage('about')} />
          <TweakButton label="Book" secondary onClick={() => setPage('book')} />
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
